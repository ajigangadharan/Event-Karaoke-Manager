<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>KARAOKE MANAGER PRO - PLAYER-V2.0-26-025-V13</title>
<style>
:root{--accent:#3df576;--bg:#050505;--panel:#111;--danger:#ff4757;--info:#2980b9;--warn:#ffc107;--highlight:rgba(255,255,150,0.4);}
*{box-sizing:border-box;}
body{background:var(--bg);color:#e0e0e0;font-family:'Segoe UI',sans-serif;margin:15px;font-size:11px;}
.main-title{text-align:center;color:var(--accent);font-size:26px;font-weight:bold;margin-bottom:12px;text-transform:uppercase;letter-spacing:2px;}
input,select,[contenteditable="true"]{text-transform:uppercase!important;font-weight:bold;font-size:11px!important;}
/* ── Setup bar ── */

/* ── Toast ── */

.player-controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ── JSONBin badge ── */
#syncStatus{font-size:9px;padding:3px 7px;border-radius:4px;font-weight:bold;}

/* GitHub Pages multi-user panel */

<!-- Embedded data block — rewritten on every Save/Download -->
<script id="embeddedData" type="application/json">
{"playlist":[],"settings":{"name":"KARAOKE_MASTER_EVENT","date":"2026-01-27","durH":"3","durM":"0","break":"15"},"cloud":{"binId":"","binKey":""}}
</script>

<script>
/* ═══════════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════════ */
let playlist = [];
let editingIndex = -1;          // row currently in edit mode (-1 = none)
let timerInterval, remainingSecs = 0, isTimerPaused = false;
let currentHighlightedIndex = -1;
let _toastTimer = null;
let _pmMedia = null;            // active media element in player modal
let _pitchNodes = {};           // Web Audio nodes for pitch shift

const opts = {
  singing : ['SOLO','DUET','MEDLEY'],
  playback: ['LOCAL','MOBILE','LAPTOP','ONLINE'],
  file    : ['MP3','WAV','MP4','OTHER']
};

/* ═══════════════════════════════════════════════════════════════════
   VALIDATION
   Allowed combos (solo, duet) — medley never counts:
     [2,0]  two solo
     [1,2]  one solo + two duet
     [0,3]  three duet
   A partial state is valid if it is a subset of ANY allowed combo.
═══════════════════════════════════════════════════════════════════ */
function singerStats(name){
  const up = name.toUpperCase();
  return {
    solos : playlist.filter(s=>s.singer.toUpperCase()===up && s.singingType==='SOLO').length,
    duets : playlist.filter(s=>s.singer.toUpperCase()===up && s.singingType==='DUET').length
  };
}

function isSingerViolating(name){
  const {solos,duets} = singerStats(name);
  if(solos===0 && duets===0) return false;
  // valid if fits inside at least one allowed combo ceiling
  const allowed=[[2,0],[1,2],[0,3]];
  return !allowed.some(([ms,md])=>solos<=ms && duets<=md);
}

function violationMessage(name){
  const {solos,duets} = singerStats(name);
  if(solos>2)                 return `"${name}" has ${solos} solo songs (max 2).`;
  if(solos===2 && duets>0)    return `"${name}" has 2 solos + ${duets} duet(s) — not an allowed combo.`;
  if(solos===1 && duets>2)    return `"${name}" has 1 solo + ${duets} duets (max 2 duets with 1 solo).`;
  if(solos===0 && duets>3)    return `"${name}" has ${duets} duet songs (max 3).`;
  return `"${name}" has exceeded the allowed song combination limit.`;
}

/* ═══════════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════════ */
function initApp(){
  populateAddDropdowns();
  loadEmbeddedData();
}

function populateAddDropdowns(){
  document.getElementById('singingType').innerHTML    = opts.singing .map(o=>`<option>${o}</option>`).join('');
  document.getElementById('playbackSource').innerHTML = opts.playback.map(o=>`<option>${o}</option>`).join('');
  document.getElementById('fileType').innerHTML       = opts.file    .map(o=>`<option>${o}</option>`).join('');
}

function refreshDuetPartnerDropdown(selectId, currentVal){
  const names = [...new Set(playlist.map(s=>s.singer.toUpperCase()))].sort();
  const sel   = document.getElementById(selectId);
  if(!sel) return;
  const prev  = currentVal !== undefined ? currentVal : sel.value;
  sel.innerHTML = `<option value="">— SELECT PARTNER —</option>`
    + names.map(n=>`<option value="${n}" ${n===prev?'selected':''}>${n}</option>`).join('');
}

function onTypeChange(){
  const type  = document.getElementById('singingType').value;
  const block = document.getElementById('duetPartnerBlock');
  block.style.display = (type==='DUET') ? 'flex' : 'none';
  if(type==='DUET') refreshDuetPartnerDropdown('duetPartner');
  else document.getElementById('duetPartner').value = '';
}

/* ═══════════════════════════════════════════════════════════════════
   EMBEDDED DATA PERSISTENCE
═══════════════════════════════════════════════════════════════════ */
function loadEmbeddedData(){
  try{
    const obj = JSON.parse(document.getElementById('embeddedData').textContent.trim());
    playlist  = Array.isArray(obj.playlist) ? obj.playlist : [];
    if(obj.settings) applySettings(obj.settings);
    if(obj.cloud){
      document.getElementById('binId') .value = obj.cloud.binId  || '';
      document.getElementById('binKey').value = obj.cloud.binKey || '';
    }
  }catch(e){ playlist=[]; }
  render();
  resetCountdown();
}

function applySettings(s){
  document.getElementById('programName').value = s.name  || 'KARAOKE_MASTER_EVENT';
  document.getElementById('pDate').value        = s.date  || '2026-01-27';
  document.getElementById('pDurH').value         = s.durH  || '3';
  document.getElementById('pDurM').value         = s.durM  || '0';
  document.getElementById('breakTime').value     = s.break || '15';
  updateCounters();
}

function buildPayload(){
  return {
    playlist: playlist.map(s=>({...s,fileURL:''})),
    settings:{
      name : document.getElementById('programName').value,
      date : document.getElementById('pDate').value,
      durH : document.getElementById('pDurH').value,
      durM : document.getElementById('pDurM').value,
      break: document.getElementById('breakTime').value
    },
    cloud:{
      binId : document.getElementById('binId').value.trim(),
      binKey: document.getElementById('binKey').value.trim()
    }
  };
}

function bakeAndDownload(filename){
  const payload = JSON.stringify(buildPayload(), null, 2);
  let html = document.documentElement.outerHTML;
  html = html.replace(
    /(<script\s+id="embeddedData"[^>]*>)([\s\S]*?)(<\/script>)/,
    `$1\n${payload}\n$3`
  );
  const a = document.createElement('a');
  a.href     = URL.createObjectURL(new Blob([html],{type:'text/html'}));
  a.download = filename;
  a.click();
}

function saveProgramSettings(){
  bakeAndDownload('MASTER_PLAYER-V2.0-26-025-V13.html');
  toast('✔ Saved! New HTML downloaded — open it to restore all data.','#1a6a1a');
}

function saveAsHTML(){ bakeAndDownload('MASTER_PLAYER-V2.0-26-025-V13.html'); }

/* ═══════════════════════════════════════════════════════════════════
   CLOUD SYNC  (JSONBin.io — free, no login required for reads)
   How to set up:
     1. Go to https://jsonbin.io  → sign up free
     2. Create a bin with {} as default content → copy the Bin ID
     3. In Account → API Keys → copy your Master Key
     4. Paste both into the fields above and click PUSH
   Any user who has the Bin ID (public bin) can PULL the data.
   PUSH requires the Master Key.
═══════════════════════════════════════════════════════════════════ */
function setSyncStatus(msg,cls){
  const el=document.getElementById('syncStatus');
  el.textContent=msg; el.className=''; el.classList.add(cls);
}

async function cloudPush(){
  const binId  = document.getElementById('binId') .value.trim();
  const binKey = document.getElementById('binKey').value.trim();
  if(!binId||!binKey){ alert('Enter Bin ID and Master Key first.'); return; }
  setSyncStatus('PUSHING…','sync-busy');
  try{
    const body = JSON.stringify({ karaoke: buildPayload() });
    const r = await fetch(`https://api.jsonbin.io/v3/b/${binId}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':binKey},
      body
    });
    if(!r.ok) throw new Error(r.status);
    setSyncStatus('PUSHED ✔','sync-ok');
    toast('☁ Data pushed to shared bin!','#1a3a6a');
  }catch(e){
    setSyncStatus('PUSH ERR','sync-err');
    toast('☁ Push failed: '+e.message,'');
  }
}

async function cloudPull(){
  const binId  = document.getElementById('binId').value.trim();
  if(!binId){ alert('Enter Bin ID first.'); return; }
  setSyncStatus('PULLING…','sync-busy');
  try{
    const r = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`,{
      headers:{'X-Bin-Meta':'false'}
    });
    if(!r.ok) throw new Error(r.status);
    const json = await r.json();
    const data = json.karaoke || json;
    if(Array.isArray(data.playlist)) playlist = data.playlist;
    if(data.settings) applySettings(data.settings);
    setSyncStatus('PULLED ✔','sync-ok');
    render();
    toast('☁ Data pulled from shared bin!','#1a3a6a');
  }catch(e){
    setSyncStatus('PULL ERR','sync-err');
    toast('☁ Pull failed: '+e.message,'');
  }
}

async function cloudCreateBin(){
  const binKey = document.getElementById('binKey').value.trim();
  if(!binKey){ alert('Enter your Master Key first (get it from jsonbin.io → Account → API Keys).'); return; }
  setSyncStatus('CREATING…','sync-busy');
  try{
    const r = await fetch('https://api.jsonbin.io/v3/b',{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Master-Key':binKey,'X-Bin-Name':'KaraokeManager'},
      body: JSON.stringify({ karaoke: buildPayload() })
    });
    if(!r.ok) throw new Error(r.status);
    const json = await r.json();
    const newId = json.metadata?.id || json.metadata?.bin_id || '';
    document.getElementById('binId').value = newId;
    setSyncStatus('CREATED ✔','sync-ok');
    toast(`☁ Bin created! ID: ${newId} — share this ID with other users so they can PULL.`,'#1a3a6a');
  }catch(e){
    setSyncStatus('CREATE ERR','sync-err');
    toast('☁ Create failed: '+e.message,'');
  }
}

/* ═══════════════════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════════════════ */
function toast(msg, bg){
  const el=document.getElementById('toastBox');
  el.textContent=msg;
  el.style.background = bg || 'var(--danger)';
  el.style.display='block';
  el.style.animation='none'; el.offsetHeight;
  el.style.animation='toastIn .3s ease forwards';
  if(_toastTimer) clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{
    el.style.animation='toastOut .4s ease forwards';
    setTimeout(()=>{el.style.display='none';},420);
  },4200);
}

/* ═══════════════════════════════════════════════════════════════════
   ADD SONG
═══════════════════════════════════════════════════════════════════ */
function updateAttachLabel(input){
  if(input.files&&input.files[0])
    document.getElementById('attachBtn').innerText=input.files[0].name.toUpperCase();
}

function addSong(){
  const singer=document.getElementById('singerName').value.trim().toUpperCase();
  const song  =document.getElementById('songName')  .value.trim().toUpperCase();
  if(!singer||!song){ alert('Singer and Song are required!'); return; }
  const type   =document.getElementById('singingType')   .value;
  const partner=(type==='DUET') ? document.getElementById('duetPartner').value.trim().toUpperCase() : '';
  const fi=document.getElementById('fileInput');
  const entry={
    singer,song,singingType:type,duetPartner:partner,
    status:'PENDING',presence:'PRESENT',
    playback:document.getElementById('playbackSource').value,
    fileType:document.getElementById('fileType').value,
    fileName:'',fileURL:'',avgMin:5
  };
  if(fi.files&&fi.files[0]){ entry.fileName=fi.files[0].name.toUpperCase(); entry.fileURL=URL.createObjectURL(fi.files[0]); }
  playlist.push(entry);
  if(isSingerViolating(singer)) toast(violationMessage(singer));
  document.getElementById('attachBtn').innerText='ATTACH FILE';
  fi.value='';
  render();
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════════════════ */
function render(){
  const body=document.getElementById('pBody');
  body.innerHTML='';
  // Refresh partner dropdown in add-form to include any new singers
  refreshDuetPartnerDropdown('duetPartner');

  playlist.forEach((s,i)=>{
    const hasFile  = s.fileURL&&s.fileURL.trim()!=='';
    const hlClass  = i===currentHighlightedIndex ? 'row-moving' : '';
    const isEdit   = i===editingIndex;
    const violates = isSingerViolating(s.singer);
    const sClass   = violates ? 'singer-warn' : 'singer-ok';

    /* Singer cell */
    const singerCell = isEdit
      ? `<input type="text" id="ed_singer_${i}" value="${esc(s.singer)}" style="width:100%;">`
      : `<span class="${sClass}">${s.singer}</span>`;

    /* Song cell */
    const songCell = isEdit
      ? `<input type="text" id="ed_song_${i}" value="${esc(s.song)}" style="width:100%;">`
      : s.song;

    /* Type + partner cell */
    const typeCell = buildTypeCell(i,s,isEdit);

    /* File cell */
    const fileCell = hasFile
      ? `<div class="file-cell-wrap"><div class="file-name-text" title="${s.fileName}">${s.fileName}</div><button class="btn" onclick="detachFile(${i})" style="background:var(--danger);font-size:8px;">✕</button></div>`
      : `<div class="file-cell-wrap"><button class="btn btn-attach" onclick="document.getElementById('fr${i}').click()" style="width:100%;font-size:8px;">ATTACH</button><input type="file" id="fr${i}" onchange="replaceFile(${i},this.files[0])" style="display:none;"></div>`;

    /* MINS cell */
    const minCell = isEdit
      ? `<input type="number" id="ed_min_${i}" value="${s.avgMin}" style="width:32px;">`
      : s.avgMin;

    /* Action buttons */
    const actCell = isEdit
      ? `<button class="btn btn-save" onclick="saveEdit(${i})">SAVE</button>
         <button class="btn" onclick="cancelEdit()" style="background:var(--danger);">✕</button>`
      : `<button class="btn btn-edit" onclick="startEdit(${i})">EDIT</button>
         <button class="btn" style="background:${hasFile?'#fff':'#333'};color:${hasFile?'#000':'#666'};" onclick="openPlayer(${i})" ${!hasFile?'disabled':''}>▶</button>
         <button class="btn btn-duplicate" onclick="duplicateRow(${i})">DUP</button>
         <button class="btn" onclick="deleteRow(${i})" style="background:var(--danger);">✕</button>`;

    body.innerHTML+=`
    <tr class="${hlClass}${isEdit?' editing-row':''}" ondblclick="toggleHighlight(${i},event)">
      <td>${i+1}</td>
      <td>${singerCell}</td>
      <td>${songCell}</td>
      <td>${typeCell}</td>
      <td><button class="toggle-btn status-${s.status.toLowerCase()}" onclick="toggleStatus(${i})">${s.status}</button></td>
      <td><button class="toggle-btn presence-${s.presence.toLowerCase()}" onclick="togglePresence(${i})">${s.presence}</button></td>
      <td><select onchange="edit(${i},'playback',this.value)">${opts.playback.map(o=>`<option ${o===s.playback?'selected':''}>${o}</option>`).join('')}</select></td>
      <td><select onchange="edit(${i},'fileType',this.value)">${opts.file.map(o=>`<option ${o===s.fileType?'selected':''}>${o}</option>`).join('')}</select></td>
      <td>${fileCell}</td>
      <td>${minCell}</td>
      <td>
        <button class="btn" onclick="move(${i},-1,event)" style="padding:3px 5px;">▲</button>
        <button class="btn" onclick="move(${i},1,event)"  style="padding:3px 5px;">▼</button>
      </td>
      <td>${actCell}</td>
    </tr>`;
  });
  updateCounters();
}

function buildTypeCell(i,s,isEdit){
  const singerNames = [...new Set(playlist.map(p=>p.singer.toUpperCase()))].sort();
  const partnerOpts = `<option value="">—</option>`
    +singerNames.map(n=>`<option value="${n}" ${n===s.duetPartner?'selected':''}>${n}</option>`).join('');

  if(isEdit){
    const typeSel=`<select id="ed_type_${i}" onchange="editTypeInline(${i})">${opts.singing.map(o=>`<option ${o===s.singingType?'selected':''}>${o}</option>`).join('')}</select>`;
    const partnerSel = s.singingType==='DUET'
      ? `<select id="ed_partner_${i}" style="margin-top:2px;">${partnerOpts}</select>`
      : `<span id="ed_partner_${i}"></span>`;
    return `<div style="display:flex;flex-direction:column;gap:2px;">${typeSel}${partnerSel}</div>`;
  }
  // view mode
  const dd=`<select onchange="quickEditType(${i},this.value)">${opts.singing.map(o=>`<option ${o===s.singingType?'selected':''}>${o}</option>`).join('')}</select>`;
  if(s.singingType==='DUET'){
    return `<div style="display:flex;flex-direction:column;gap:2px;">${dd}
      <select onchange="quickEditPartner(${i},this.value)" style="font-size:8px;color:var(--warn);background:#1a1a1a;border:1px solid var(--warn);border-radius:3px;">${partnerOpts}</select>
    </div>`;
  }
  return dd;
}

/* ═══════════════════════════════════════════════════════════════════
   EDIT MODE (row-level)
═══════════════════════════════════════════════════════════════════ */
function startEdit(i){  editingIndex=i;  render(); }
function cancelEdit(){  editingIndex=-1; render(); }

function editTypeInline(i){
  // toggle partner field visibility without full re-render
  const type=document.getElementById(`ed_type_${i}`).value;
  const pEl =document.getElementById(`ed_partner_${i}`);
  if(!pEl) return;
  const singerNames=[...new Set(playlist.map(p=>p.singer.toUpperCase()))].sort();
  const opts2=`<option value="">—</option>`+singerNames.map(n=>`<option value="${n}" ${n===playlist[i].duetPartner?'selected':''}>${n}</option>`).join('');
  if(type==='DUET'){
    pEl.outerHTML=`<select id="ed_partner_${i}" style="margin-top:2px;">${opts2}</select>`;
  } else {
    pEl.outerHTML=`<span id="ed_partner_${i}"></span>`;
  }
}

function saveEdit(i){
  const s=playlist[i];
  s.singer     =(document.getElementById(`ed_singer_${i}`)?.value  ||s.singer) .trim().toUpperCase();
  s.song       =(document.getElementById(`ed_song_${i}`)  ?.value  ||s.song)   .trim().toUpperCase();
  s.singingType= document.getElementById(`ed_type_${i}`)  ?.value  ||s.singingType;
  const pEl    = document.getElementById(`ed_partner_${i}`);
  s.duetPartner= (pEl&&pEl.tagName==='SELECT') ? pEl.value.toUpperCase() : (s.singingType==='DUET'?s.duetPartner:'');
  const minEl  = document.getElementById(`ed_min_${i}`);
  if(minEl) s.avgMin = parseInt(minEl.value)||s.avgMin;
  editingIndex=-1;
  if(isSingerViolating(s.singer)) toast(violationMessage(s.singer));
  render();
}

/* quick inline edits (view mode dropdowns) */
function quickEditType(i,v){
  playlist[i].singingType=v;
  if(v!=='DUET') playlist[i].duetPartner='';
  if(isSingerViolating(playlist[i].singer)) toast(violationMessage(playlist[i].singer));
  render();
}
function quickEditPartner(i,v){ playlist[i].duetPartner=v.toUpperCase(); }
function edit(i,f,v){ playlist[i][f]=v.toUpperCase(); if(f==='singer') render(); }

/* ═══════════════════════════════════════════════════════════════════
   ROW OPERATIONS
═══════════════════════════════════════════════════════════════════ */
function duplicateRow(i){
  const d={...playlist[i],status:'PENDING',presence:'PRESENT'};
  playlist.splice(i+1,0,d);
  if(isSingerViolating(d.singer)) toast(violationMessage(d.singer));
  render();
}
function toggleHighlight(i,e){ if(e)e.stopPropagation(); currentHighlightedIndex=(currentHighlightedIndex===i)?-1:i; render(); }
function move(i,d,e){
  if(e)e.stopPropagation();
  const t=i+d;
  if(t<0||t>=playlist.length)return;
  [playlist[i],playlist[t]]=[playlist[t],playlist[i]];
  if(currentHighlightedIndex===i)currentHighlightedIndex=t;
  if(editingIndex===i)editingIndex=t;
  render();
}
function detachFile(i)       {playlist[i].fileName='';playlist[i].fileURL='';render();}
function replaceFile(i,file) {if(file){playlist[i].fileName=file.name.toUpperCase();playlist[i].fileURL=URL.createObjectURL(file);render();}}
function toggleStatus(i)     {playlist[i].status   =playlist[i].status   ==='PENDING'?'SUNG'   :'PENDING';render();}
function togglePresence(i)   {playlist[i].presence =playlist[i].presence ==='PRESENT'?'ABSENT' :'PRESENT';render();}
function deleteRow(i)        {if(editingIndex===i)editingIndex=-1;playlist.splice(i,1);render();}

/* ═══════════════════════════════════════════════════════════════════
   PLAYER MODAL  (with Tempo & Pitch via Web Audio API)
═══════════════════════════════════════════════════════════════════ */
let _audioCtx=null, _sourceNode=null, _gainNode=null;

function openPlayer(i){
  const s=playlist[i];
  if(!s.fileURL){toast('No file attached.');return;}
  document.getElementById('pm-singer').textContent = s.singer;
  document.getElementById('pm-song')  .textContent = s.song + (s.duetPartner?` ♦ ${s.duetPartner}`:'');
  const wrap=document.getElementById('playerMediaWrap');
  wrap.innerHTML='';
  const isVid=s.fileName.toLowerCase().endsWith('.mp4')||s.fileName.toLowerCase().endsWith('.webm');
  const el=document.createElement(isVid?'video':'audio');
  el.src=s.fileURL; el.controls=true; el.id='pmMedia';
  if(isVid)el.style.maxHeight='220px';
  wrap.appendChild(el);
  _pmMedia=el;
  // reset controls
  document.getElementById('tempoSlider').value=1;
  document.getElementById('pitchSlider').value=0;
  document.getElementById('tempoVal').textContent='1.00×';
  document.getElementById('pitchVal').textContent='±0 st';
  document.getElementById('playerModal').classList.add('open');
  el.play().catch(()=>{});
}

function applyTempo(v){
  const el=document.getElementById('pmMedia');
  if(el) el.playbackRate=parseFloat(v);
  document.getElementById('tempoVal').textContent=parseFloat(v).toFixed(2)+'×';
}

function applyPitch(v){
  document.getElementById('pitchVal').textContent=(v>=0?'+':'')+v+' st';
  // Pitch shift via detune on a Web Audio source
  const el=document.getElementById('pmMedia');
  if(!el)return;
  const semitones=parseInt(v);
  if(!_audioCtx){
    try{
      _audioCtx=new(window.AudioContext||window.webkitAudioContext)();
      const src=_audioCtx.createMediaElementSource(el);
      _gainNode=_audioCtx.createGain();
      src.connect(_gainNode);
      _gainNode.connect(_audioCtx.destination);
      _sourceNode=src;
    }catch(e){ return; }
  }
  // detune is in cents (100 cents = 1 semitone)
  if(_sourceNode && _sourceNode.detune!==undefined){
    _sourceNode.detune.value=semitones*100;
  }
}

function pmPlay()  { document.getElementById('pmMedia')?.play(); }
function pmPause() { document.getElementById('pmMedia')?.pause(); }
function pmStop()  { const m=document.getElementById('pmMedia'); if(m){m.pause();m.currentTime=0;} }
function pmReset() {
  pmStop();
  document.getElementById('tempoSlider').value=1; applyTempo(1);
  document.getElementById('pitchSlider').value=0; applyPitch(0);
}
function closePlayer(){
  pmStop();
  _audioCtx=null; _sourceNode=null; _gainNode=null;
  document.getElementById('playerModal').classList.remove('open');
  document.getElementById('playerMediaWrap').innerHTML='';
}
// Close on backdrop click
document.getElementById('playerModal').addEventListener('click',function(e){
  if(e.target===this)closePlayer();
});

/* ═══════════════════════════════════════════════════════════════════
   TIMER
═══════════════════════════════════════════════════════════════════ */
function startCountdown(){
  if(isTimerPaused&&remainingSecs>0){isTimerPaused=false;}
  else{remainingSecs=(+document.getElementById('pDurH').value*3600)+(+document.getElementById('pDurM').value*60);}
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{if(remainingSecs<=0){stopCountdown();return;}remainingSecs--;updateTimerDisplay();},1000);
}
function stopCountdown() {clearInterval(timerInterval);remainingSecs=0;isTimerPaused=false;updateTimerDisplay();}
function pauseCountdown(){clearInterval(timerInterval);isTimerPaused=true;}
function resetCountdown(){stopCountdown();remainingSecs=(+document.getElementById('pDurH').value*3600)+(+document.getElementById('pDurM').value*60);updateTimerDisplay();}
function updateTimerDisplay(){
  const h=Math.floor(remainingSecs/3600).toString().padStart(2,'0');
  const m=Math.floor((remainingSecs%3600)/60).toString().padStart(2,'0');
  const sec=(remainingSecs%60).toString().padStart(2,'0');
  document.getElementById('progTimer').innerText=`${h}:${m}:${sec}`;
}

/* ═══════════════════════════════════════════════════════════════════
   COUNTERS
═══════════════════════════════════════════════════════════════════ */
function updateCounters(){
  const total=playlist.length;
  const sung =playlist.filter(s=>s.status==='SUNG').length;
  let mins=0; playlist.forEach(s=>{if(s.status==='PENDING')mins+=parseInt(s.avgMin||0);});
  document.getElementById('totalSongs')   .innerText=total;
  document.getElementById('playedSongs')  .innerText=sung;
  document.getElementById('pendingSongs') .innerText=total-sung;
  document.getElementById('totalSingTime').innerText=Math.floor(mins/60)+'H '+(mins%60)+'M';
  const brk=parseInt(document.getElementById('breakTime').value)||0;
  document.getElementById('grandTotalTime').innerText=Math.floor((mins+brk)/60)+'H '+((mins+brk)%60)+'M';
}

/* ═══════════════════════════════════════════════════════════════════
   IMPORT / EXPORT
═══════════════════════════════════════════════════════════════════ */
function exportList(){
  const blob=new Blob([JSON.stringify(playlist.map(s=>({...s,fileURL:''})))],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`Playlist_${document.getElementById('programName').value}.json`;
  a.click();
}
function importList(input){
  const f=input.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=e=>{try{playlist=JSON.parse(e.target.result);render();}catch{alert('Invalid file format');}};
  r.readAsText(f);
}

/* ═══════════════════════════════════════════════════════════════════
   UTILITY
═══════════════════════════════════════════════════════════════════ */
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
